name: Build iOS IPA (Fixed)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI and Expo CLI
        run: npm install -g eas-cli expo-cli

      - name: Install dependencies
        run: npm install

      # Limpiamos cualquier rastro anterior para asegurar un build limpio
      - name: Prebuild iOS (Clean)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      # ESTE ES EL PASO CRÍTICO CORREGIDO
      - name: Build IPA (Unsigned)
        run: |
          # Usamos find con maxdepth 1 para que NO entre dentro de las carpetas
          # Esto garantiza que coja "Podium.xcworkspace" y no el archivo de dentro
          WORKSPACE_PATH=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)

          # Sacamos el nombre del proyecto quitando la extensión
          SCHEME_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)

          echo "========================================"
          echo "✅ RUTA WORKSPACE: $WORKSPACE_PATH"
          echo "✅ NOMBRE ESQUEMA: $SCHEME_NAME"
          echo "========================================"

          # Verificación de seguridad
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "❌ ERROR FATAL: No se encontró ningún .xcworkspace en la carpeta ios/"
            ls -la ios/
            exit 1
          fi

          mkdir -p build

          # Ejecutamos xcodebuild con las rutas exactas encontradas
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath "$PWD/build/$SCHEME_NAME.xcarchive" \
                     clean archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGNING_IDENTITY=""

          # Empaquetamos el IPA
          mkdir -p "$PWD/build/Payload"
          cp -r "$PWD/build/$SCHEME_NAME.xcarchive/Products/Applications/"*.app "$PWD/build/Payload/"
          cd build && zip -r Podium.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Podium-IPA
          path: build/Podium.ipa
