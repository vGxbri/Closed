name: Build iOS IPA (Sideloadly version)
on:
  workflow_dispatch: # Esto activa un botón para darle a "Play" manualmente

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Expo and EAS
        run: npm install -g expo-cli eas-cli

      - name: Install dependencies
        run: npm install

      - name: Build Project (Prebuild)
        run: npx expo prebuild --platform ios

      - name: Build IPA (Unsigned)
        run: |
          # 1. Crear carpeta de salida
          mkdir -p build

          # 2. Ejecutar el build forzando el esquema "Podium"
          # Usamos CODE_SIGNING_ALLOWED=NO porque Sideloadly firmará la app después
          xcodebuild -workspace ios/Podium.xcworkspace \
                     -scheme "Podium" \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/Podium.xcarchive \
                     clean archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGNING_IDENTITY=""

          # 3. Empaquetar el contenido del .app en un archivo .ipa
          mkdir -p $PWD/build/Payload
          cp -r $PWD/build/Podium.xcarchive/Products/Applications/*.app $PWD/build/Payload
          cd build && zip -r Podium.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Podium-IPA
          path: build/Podium.ipa
