name: Build iOS IPA (Sideloadly version)
on:
  workflow_dispatch: # Esto activa un botón para darle a "Play" manualmente

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Expo and EAS
        run: npm install -g expo-cli eas-cli

      - name: Install dependencies
        run: npm install

      - name: Build Project (Prebuild)
        run: npx expo prebuild --platform ios

      - name: Build IPA (Unsigned)
        run: |
          # 1. Detectar el nombre del proyecto automáticamente
          PROJECT_NAME=$(basename ios/*.xcodeproj .xcodeproj)
          echo "Detectado proyecto: $PROJECT_NAME"

          # 2. Ejecutar el build usando el nombre detectado
          xcodebuild -workspace ios/$PROJECT_NAME.xcworkspace \
                     -scheme "$PROJECT_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/$PROJECT_NAME.xcarchive \
                     clean archive \
                     CODE_SIGNING_ALLOWED=NO

          # 3. Empaquetar el .app en un .ipa
          mkdir -p $PWD/build/Payload
          cp -r $PWD/build/$PROJECT_NAME.xcarchive/Products/Applications/*.app $PWD/build/Payload
          cd build && zip -r Podium.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Podium-IPA
          path: build/Podium.ipa
