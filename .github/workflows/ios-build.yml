name: Build iOS IPA (Sideloadly version)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Actualizado a Node 20 para Expo SDK 54

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build IPA (Unsigned)
        run: |
          # 1. Encontrar el Workspace y el Esquema real
          WORKSPACE=$(ls ios/*.xcworkspace | head -n 1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | grep -A 1 "Schemes:" | tail -n 1 | xargs)

          echo "-----------------------------------------------"
          echo "Workspace detectado: $WORKSPACE"
          echo "Esquema detectado: $SCHEME"
          echo "-----------------------------------------------"

          mkdir -p build

          # 2. Compilar usando las variables detectadas
          xcodebuild -workspace "$WORKSPACE" \
                     -scheme "$SCHEME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $PWD/build/Podium.xcarchive \
                     clean archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGNING_IDENTITY=""

          # 3. Crear el Payload para el IPA
          mkdir -p $PWD/build/Payload
          cp -r $PWD/build/Podium.xcarchive/Products/Applications/*.app $PWD/build/Payload
          cd build && zip -r Podium.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Podium-IPA
          path: build/Podium.ipa
